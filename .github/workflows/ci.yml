name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Validate YAML orchestration files
        run: |
          python -c "
          import pathlib, sys, yaml

          errors = []
          yaml_dir = pathlib.Path('orchestration')
          if not yaml_dir.exists():
              print('No orchestration/ directory found, skipping YAML validation.')
              sys.exit(0)

          for f in sorted(yaml_dir.rglob('*.yaml')):
              try:
                  yaml.safe_load(f.read_text())
                  print(f'  OK: {f}')
              except yaml.YAMLError as e:
                  errors.append(f'{f}: {e}')
                  print(f'  FAIL: {f}')

          for f in sorted(yaml_dir.rglob('*.yml')):
              try:
                  yaml.safe_load(f.read_text())
                  print(f'  OK: {f}')
              except yaml.YAMLError as e:
                  errors.append(f'{f}: {e}')
                  print(f'  FAIL: {f}')

          if errors:
              print('\nYAML validation failures:')
              for err in errors:
                  print(f'  - {err}')
              sys.exit(1)
          else:
              print('\nAll YAML files valid.')
          "

      - name: Validate agent markdown frontmatter
        run: |
          python -c "
          import pathlib, sys, re

          REQUIRED_FIELDS = ['name', 'role', 'model', 'character', 'rank']
          errors = []
          agents_dir = pathlib.Path('agents/masters')
          if not agents_dir.exists():
              print('No agents/masters/ directory found, skipping frontmatter validation.')
              sys.exit(0)

          for f in sorted(agents_dir.rglob('*.md')):
              content = f.read_text()
              match = re.match(r'^---\s*\n(.*?)\n---', content, re.DOTALL)
              if not match:
                  errors.append(f'{f}: missing YAML frontmatter')
                  continue
              frontmatter = match.group(1)
              for field in REQUIRED_FIELDS:
                  if not re.search(rf'^{field}\s*:', frontmatter, re.MULTILINE):
                      errors.append(f'{f}: missing required field \"{field}\"')

          if errors:
              print('Agent frontmatter validation failures:')
              for err in errors:
                  print(f'  - {err}')
              sys.exit(1)
          else:
              print('All agent markdown files have valid frontmatter.')
          "

      - name: Run tests
        run: pytest
